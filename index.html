<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QAZAQ MAX v2.0</title>
    <style>
        :root {
            --primary-color: #ff3b30;
            --primary-shadow: rgba(255, 59, 48, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0d0202;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 390px;
            background: linear-gradient(145deg, rgba(30, 10, 10, 0.95), rgba(15, 3, 3, 0.98));
            border: 2px solid #3a1212;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 59, 48, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .view { display: none; }
        .view.active { display: block; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .status-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary-color);
        }

        .app-title {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .app-title span {
            color: var(--primary-color);
            text-shadow: 0 0 12px var(--primary-shadow);
        }

        .input-group {
            margin-top: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .text-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #5a1a1a;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .text-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-shadow);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(180deg, var(--primary-color) 0%, #000000 200%);
            border: none;
            border-radius: 14px;
            padding: 16px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 4px 18px var(--primary-shadow);
            text-transform: uppercase;
        }

        .toggle-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 13px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }

        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #331d1d;
            transition: .3s; border-radius: 24px;
        }

        .slider:before {
            position: absolute; content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: #999;
            transition: .3s; border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-shadow);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: white;
        }

        .range-container {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }

        .range-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            color: #b0b0b0;
            margin-bottom: 10px;
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            background: #331d1d; outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            box-shadow: 0 0 8px var(--primary-color);
            cursor: pointer;
        }

        .error-msg { color: #ff3b30; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- ЖҮЙЕГЕ КІРУ ЕКРАНЫ -->
        <div id="lockView" class="view active">
            <div class="header">
                <div class="status-group">
                    <div class="status-dot"></div>
                    <div class="app-title">QAZAQ <span>MAX</span></div>
                </div>
                <div class="version-tag">v2.0</div>
            </div>
            
            <div class="input-group">
                <label style="font-size: 13px; color: #d0d0d0; display:block; margin-bottom:12px;">ЖҮЙЕГЕ КІРУ ПАРОЛІН ЕНГІЗІҢІЗ</label>
                <input type="text" id="passwordInput" class="text-input" placeholder="Пароль">
                <div id="passwordError" class="error-msg">Қате пароль! Қайта тексеріңіз.</div>
            </div>

            <button class="btn-primary" onclick="checkPassword()">ЖҮЙЕГЕ КІРУ</button>
        </div>

        <!-- МӘЗІР ЕКРАНЫ -->
        <div id="menuView" class="view">
            <div class="header">
                <div class="status-group">
                    <div class="status-dot"></div>
                    <div class="app-title">КӨМЕКШІ <span>@QAZAQ_MAX</span></div>
                </div>
                <div class="version-tag" style="color: var(--primary-color);">v2.0</div>
            </div>

            <div class="toggle-item">
                <span style="font-size: 14px;">Дәлдік деңгейі (Precisão Full)</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>

            <div class="toggle-item">
                <span style="font-size: 14px;">Экран дірілін жою (Remover Treme)</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>

            <div class="toggle-item">
                <span style="font-size: 14px;">Ақ прицелді жақсарту (Mira Branca)</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>

            <div class="toggle-item">
                <span style="font-size: 14px;">Қайтарымды азайту (Anti-Recoil)</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>

            <div class="range-container">
                <div class="range-header">
                    <span>СЕНСОР СЕЗІМТALДЫҒЫ (PRECISÃO)</span>
                    <span style="color: var(--primary-color);" id="rangeVal">90%</span>
                </div>
                <input type="range" class="range-slider" min="0" max="100" value="90" oninput="document.getElementById('rangeVal').innerText = this.value + '%'">
            </div>

            <div style="margin-bottom: 20px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 12px; padding: 12px 16px;">
                <label style="font-size: 12px; color: #b0b0b0; display: block; margin-bottom: 5px;">FREE FIRE НҰСҚАСЫН ТАҢДАҢЫЗ:</label>
                <select id="ffVersion" style="width: 100%; background: transparent; border: none; color: white; font-size: 14px; outline: none; cursor: pointer;">
                    <option value="normal" style="background: #150505;">Кәдімгі Free Fire</option>
                    <option value="max" style="background: #150505;">Free Fire MAX</option>
                </select>
            </div>

            <button class="btn-primary" onclick="openGameNow()">ФУНКЦИЯЛАРДЫ ОЙЫНҒА ЕНГІЗУ</button>
        </div>

    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('passwordInput').value.trim();
            const error = document.getElementById('passwordError');
            
            // Кіру паролі: KAZMAX09
            if (pass.toUpperCase() === "KAZMAX09") {
                error.style.display = 'none';
                document.getElementById('lockView').classList.remove('active');
                document.getElementById('menuView').classList.add('active');
            } else {
                error.style.display = 'block';
            }
        }

        function openGameNow() {
            const selectedVersion = document.getElementById('ffVersion').value;
            
            if (selectedVersion === "max") {
                window.location.href = "freefiremax://";
            } else {
                window.location.href = "freefire://";
            }
        }
    </script>
</body>
</html>
</html>
