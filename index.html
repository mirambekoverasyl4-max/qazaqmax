<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KAZMAX РЕГЕДИТ v5.5</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.co/N0M7v3m4/messi-wc-nobg.png">
    <style>
        :root { --туси: #ff1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background: #000; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* ОЙЫН ІШІНДЕ ТҰРАТЫН ПРИЦЕЛ */
        .прицел { position: fixed; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999999; display: none; }
        .нукте { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: var(--туси); border-radius: 50%; box-shadow: 0 0 12px var(--туси); }
        .шоншей { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 2px solid var(--туси); border-radius: 50%; opacity: 0.8; }

        /* БАСТЫ БЕТ */
        #бет-1 { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .месси { width: 120px; height: 120px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--туси)); }
        .аты { font-size: 24px; font-weight: bold; color: var(--туси); margin-bottom: 20px; }
        .кілт { width: 100%; max-width: 280px; padding: 14px; background: #111; border: 1px solid #222; border-radius: 10px; font-size: 16px; color: #fff; text-align: center; margin-bottom: 15px; font-weight: bold; outline: none; }
        .басу { width: 100%; max-width: 280px; padding: 14px; background: var(--туси); border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
        .кате { color: var(--туси); font-size: 12px; margin-top: 10px; display: none; font-weight: bold; }

        /* МӘЗІР */
        #бет-2 { display: none; width: 100%; height: 100vh; padding: 20px; overflow-y: auto; }
        .блок { background: #0c0c0f; border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #111; }
        .тустер { display: flex; justify-content: space-around; padding: 5px 0; }
        .донгелек { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #222; cursor: pointer; }
        
        .жол { padding: 8px 0; }
        .жазу { display: flex; justify-content: space-between; font-size: 13px; color: #ccc; margin-bottom: 5px; }
        .жазу span:last-child { color: var(--туси); font-weight: bold; }
        .сырғыту { -webkit-appearance: none; width: 100%; height: 5px; background: #222; border-radius: 3px; outline: none; }
        .сырғыту::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--туси); cursor: pointer; }

        .косу-жол { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .косқыш { position: relative; display: inline-block; width: 44px; height: 24px; }
        .косқыш input { display: none; }
        .батырма { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #222; transition: .3s; border-radius: 24px; }
        .батырма:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; transition: .3s; border-radius: 50%; }
        input:checked + .батырма { background: var(--туси); }
        input:checked + .батырма:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="прицел" id="оқ-орта">
        <div class="шоншей" id="п-шеңбер"></div>
        <div class="нукте" id="п-нүкте"></div>
    </div>

    <div id="бет-1">
        <img src="https://i.postimg.co/N0M7v3m4/messi-wc-nobg.png" class="месси" alt="Messi">
        <div class="аты">KAZMAX РЕГЕДИТ</div>
        <input type="password" class="кілт" id="пароль" placeholder="••••••••">
        <button class="басу" onclick="кіру()">КІРУ</button>
        <div class="кате" id="қате-жазу">ҚҰПИЯ СӨЗ ҚАТЕ!</div>
    </div>

    <div id="бет-2">
        <div style="text-align:center; margin-bottom:20px;">
            <h2 style="font-size:22px;">KAZMAX <span style="color:var(--туси)">ЖҮЙЕСІ</span></h2>
            <p style="font-size:10px; color:var(--туси); letter-spacing:2px;">ТАЗА ҚАЗАҚША НҰСҚА</p>
        </div>

        <div class="блок">
            <div style="font-size:12px; color:#aaa; margin-bottom:8px; text-align:center;">Прицел түсін таңдау:</div>
            <div class="тустер">
                <button class="донгелек" style="background:#ff1a1a" onclick="ауыстыру('#ff1a1a')"></button>
                <button class="донгелек" style="background:#00ffcc" onclick="ауыстыру('#00ffcc')"></button>
                <button class="донгелек" style="background:#007aff" onclick="ауыстыру('#007aff')"></button>
                <button class="донгелек" style="background:#ffcc00" onclick="ауыстыру('#ffcc00')"></button>
            </div>
        </div>

        <div class="блок">
            <div class="жол">
                <div class="жазу"><span>Сезімталдық (360 градус)</span><span id="мән-1">360°</span></div>
                <input type="range" class="сырғыту" min="0" max="360" value="360" id="с-1" oninput="жаңарту('с-1','мән-1','°')">
            </div>
            <div class="жол">
                <div class="жазу"><span>Экран жиілігі (120 герц)</span><span id="мән-2">120 Hz</span></div>
                <input type="range" class="сырғыту" min="60" max="120" value="120" id="с-2" oninput="жаңарту('с-2','мән-2',' Hz')">
            </div>
            <div class="жол">
                <div class="жазу"><span>Ойын жылдамдығы (240 фпс)</span><span id="мән-3">240 FPS</span></div>
                <input type="range" class="сырғыту" min="30" max="240" value="240" id="с-3" oninput="жаңарту('с-3','мән-3',' FPS')">
            </div>
        </div>

        <div class="блок">
            <div class="косу-жол">
                <div><h4>Экрандағы қызыл прицел</h4><p style="font-size:10px; color:#555">Ойын ішінде жоғалмайды</p></div>
                <label class="косқыш"><input type="checkbox" id="қос-п"><span class="батырма"></span></label>
            </div>
            <div class="косу-жол">
                <div><h4>Авто-наводка (Дәлдік)</h4><p style="font-size:10px; color:#555">Оқты басқа бағыттайды</p></div>
                <label class="косқыш"><input type="checkbox" checked><span class="батырма"></span></label>
            </div>
        </div>

        <button class="басу" style="width:100%; padding:16px; background:linear-gradient(90deg, #900, #ff1a1a);" onclick="ойындыАшу()">ОЙЫНҒА КІРУ</button>
    </div>

    <script>
        function кіру() {
            if (document.getElementById('пароль').value.trim().toUpperCase() === "KAZMAX09") {
                document.getElementById('бет-1').style.display = 'none';
                document.getElementById('бет-2').style.display = 'block';
            } else { document.getElementById('қате-жазу').style.display = 'block'; }
        }

        function жаңарту(сИд, лИд, бірлік) {
            document.getElementById(lИд).innerText = document.getElementById(сИд).value + бірлік;
        }

        function ауыстыру(түс) {
            document.getElementById('п-нүкте').style.background = түс;
            document.getElementById('п-шеңбер').style.borderColor = түс;
            document.getElementById('п-нүкте').style.boxShadow = `0 0 12px ${түс}`;
            document.documentElement.style.setProperty('--туси', түс);
        }

        document.getElementById('қос-п').addEventListener('change', function(e) {
            document.getElementById('оқ-орта').style.display = e.target.checked ? 'block' : 'none';
        });

        function oyındıAsu() {
            alert("Баптаулар қосылды! ОК басқан соң Free Fire ашылады.");
            window.location.href = "freefire://"; 
        }
        function ойындыАшу() { oyındıAsu(); }
    </script>
</body>
</html>
